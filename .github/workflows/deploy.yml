name: Deploy to VPS

# Push в main → сервер сам подтягивает код и деплоит весь стек.
# Авторизация по SSH-КЛЮЧУ (VPS отключил вход по паролю → password-метод даёт
# "handshake failed ... [none password]"). Нужен секрет VPS_SSH_KEY = приватный ключ,
# чей публичный лежит в ~/.ssh/authorized_keys на VPS. Прочие секреты: VPS_HOST, VPS_USER, VPS_PORT.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /opt/leadgen

            # 1. Синхронизировать код ровно с origin/main (сносит остатки старого проекта,
            #    .env не трогается — он untracked и reset --hard его не удаляет).
            git fetch origin main
            git reset --hard origin/main

            # 2. Поднять/пересобрать ТОЛЬКО postgres + workers.
            #    web НЕ собираем на VPS (next build прожорлив, RAM 3.7ГБ) — дашборд деплоим отдельно.
            docker compose pull || true
            docker compose up -d --build postgres workers

            # 3. Применить миграции БД (Prisma). postgres healthy (depends_on),
            #    prisma CLI есть в лёгком образе workers. Ошибка миграции ДОЛЖНА валить деплой (set -e).
            docker compose run --rm workers npx prisma migrate deploy

            # 4. Статус
            docker compose ps
