name: Deploy to VPS

# Push в main → GitHub по SSH (ключ) запускает на VPS общий деплой-скрипт
# /usr/local/bin/leadgen-deploy — тот же, что и крон-поллер раз в минуту.
# Внутри скрипта flock: одновременный запуск Action и поллера безопасен (один
# берёт лок и деплоит origin/main, второй мгновенно выходит). Логика деплоя
# (reset --hard origin/main → docker compose up --build → prisma migrate deploy)
# живёт в одном месте — в скрипте на VPS, а не дублируется здесь.
#
# Секреты: VPS_HOST, VPS_USER, VPS_SSH_KEY (приватный ключ), VPS_PORT.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (key auth)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            /usr/local/bin/leadgen-deploy
