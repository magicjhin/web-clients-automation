services:
  postgres:
    image: postgres:15
    container_name: leadgen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  node:
    build: .
    container_name: leadgen_node
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts
      - /tmp/screenshots:/tmp/screenshots
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    command: node scripts/bot/index.js

volumes:
  postgres_data:
