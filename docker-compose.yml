services:
  postgres:
    image: postgres:15
    container_name: leadgen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n
    container_name: leadgen_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - GENERIC_TIMEZONE=Europe/Vilnius
      - TZ=Europe/Vilnius
      - N8N_HOST=n8n.webvibe-lead.fun
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.webvibe-lead.fun/
      - N8N_EDITOR_BASE_URL=https://n8n.webvibe-lead.fun/
      - N8N_SECURE_COOKIE=true
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  node:
    build: .
    container_name: leadgen_node
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts
      - /tmp/screenshots:/tmp/screenshots
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: tail -f /dev/null

volumes:
  postgres_data:
  n8n_data:
