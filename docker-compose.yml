---
# Leadgen LT — Docker Compose
# Сервисы: postgres, web (Next.js), workers (node-cron)
# ⚠️ БЕЗОПАСНОСТЬ: порт postgres НЕ публикуется наружу (BSI инцидент 2026-06-02).
#    Docker обходит ufw — единственная защита это отсутствие секции `ports` у postgres.
#    Доступ к БД — только внутри Docker-сети по имени сервиса postgres:5432.
# Наружу торчат только 22/80/443 через Caddy (reverse-proxy на хосте).

x-common: &common
  env_file: .env
  restart: unless-stopped
  networks:
    - internal

services:
  # ── PostgreSQL 15 ──────────────────────────────────────────────────
  postgres:
    <<: *common
    image: postgres:15-alpine
    # ❌ НЕТ секции `ports` — БД не публикуется наружу (только internal сеть)
    # Если нужен хост-доступ: SSH-туннель (ssh -L 5432:postgres:5432 leadgen)
    environment:
      POSTGRES_DB: leadgen
      POSTGRES_USER: leadgen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadgen -d leadgen"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Next.js (web dashboard) ────────────────────────────────────────
  web:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    # Публикуем ТОЛЬКО на localhost — хостовый Caddy проксирует https://leadgen.domain → 127.0.0.1:3000.
    # Не 0.0.0.0 (наружу не светим), но и не только internal — иначе хостовый Caddy не достучится (502).
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://leadgen:${POSTGRES_PASSWORD}@postgres:5432/leadgen
      NODE_ENV: production

  # ── Workers (node-cron оркестрация) ───────────────────────────────
  workers:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: ["npx", "tsx", "workers/_cron.ts"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://leadgen:${POSTGRES_PASSWORD}@postgres:5432/leadgen
      NODE_ENV: production
    # Ресурсные лимиты (нет Puppeteer, RAM 4ГБ достаточно)
    deploy:
      resources:
        limits:
          memory: 512m

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
    driver: local
